<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browse Remote Developer Jobs — remotedevelopers</title>
    <meta
      name="description"
      content="Filter remote-only developer jobs by role, experience, salary, and tech stack. Curated listings plus partner boards."
    />
    <link rel="canonical" href="https://remotedevelopers.work/jobs.html" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://remotedevelopers.work/jobs.html" />
    <meta property="og:title" content="Browse Remote Developer Jobs" />
    <meta
      property="og:description"
      content="Filter remote developer jobs by salary, tech stack, experience, and role."
    />
    <meta
      property="og:image"
      content="https://remotedevelopers.work/assets/og-image.svg"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/assets/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.5/400.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.5/500.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.5/600.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.2.5/700.css" rel="stylesheet" />
    <script>
      try {
        if (localStorage.getItem("rd-theme") === "light")
          document.documentElement.classList.add("light");
      } catch (e) {}
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: { DEFAULT: "#0B1220", mid: "#111827", light: "#1F2937" },
              accent: { teal: "#3B82F6", cyan: "#6366F1" },
            },
            fontFamily: {
              display: ["Geist Sans", "Inter", "system-ui", "sans-serif"],
              sans: ["Geist Sans", "Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="antialiased">
    <div data-rd-header="jobs"></div>
    <script src="/js/chrome.js"></script>

    <div
      id="filter-overlay"
      class="filter-drawer-overlay lg:hidden"
      aria-hidden="true"
    ></div>

    <main id="main" class="mx-auto max-w-6xl px-4 sm:px-6 py-10 sm:py-14">
      <div class="mb-8" data-reveal>
        <h1 class="text-display-lg font-display">Remote jobs</h1>
        <p class="text-muted mt-3 text-lg">
          Curated. Remote-only. Developer-first filters.
        </p>
      </div>

      <div class="sticky-search mb-8" data-reveal>
        <label class="sr-only" for="filter-search">Search jobs</label>
        <input
          id="filter-search"
          type="search"
          class="form-input form-input-lg"
          placeholder="Search jobs..."
          autocomplete="off"
        />
      </div>

      <div class="flex flex-wrap items-center gap-3 mb-6 lg:hidden">
        <button
          type="button"
          id="open-filters"
          class="btn-secondary !py-2 !px-4 text-sm"
        >
          Filters
        </button>
        <span data-results-count class="text-sm text-muted"></span>
      </div>

      <div class="lg:grid lg:grid-cols-[17rem_1fr] lg:gap-10 items-start">
        <aside
          id="filter-sidebar"
          class="filter-sidebar lg:!static lg:!translate-x-0 lg:!w-auto lg:!p-0 lg:!border-0 lg:!bg-transparent lg:!overflow-visible"
        >
          <div class="flex items-center justify-between mb-4 lg:hidden">
            <h2 class="font-display font-semibold">Filters</h2>
            <button
              type="button"
              id="close-filters"
              class="btn-secondary !p-2 text-sm"
              aria-label="Close filters"
            >
              ✕
            </button>
          </div>

          <div class="surface-panel p-5 space-y-7 lg:sticky lg:top-24">
            <div>
              <p class="form-label">Role</p>
              <div class="space-y-0.5" role="radiogroup" aria-label="Role">
                <button type="button" class="filter-radio" data-filter-role="" aria-checked="true">All roles</button>
                <button type="button" class="filter-radio" data-filter-role="Frontend" aria-checked="false">Frontend</button>
                <button type="button" class="filter-radio" data-filter-role="Backend" aria-checked="false">Backend</button>
                <button type="button" class="filter-radio" data-filter-role="Full Stack" aria-checked="false">Full Stack</button>
                <button type="button" class="filter-radio" data-filter-role="DevOps" aria-checked="false">DevOps</button>
                <button type="button" class="filter-radio" data-filter-role="AI" aria-checked="false">AI</button>
                <button type="button" class="filter-radio" data-filter-role="Data" aria-checked="false">Data</button>
              </div>
            </div>

            <div>
              <p class="form-label">Experience</p>
              <div class="space-y-0.5" role="radiogroup" aria-label="Experience">
                <button type="button" class="filter-radio" data-filter-level-radio="" aria-checked="true">Any</button>
                <button type="button" class="filter-radio" data-filter-level-radio="Junior" aria-checked="false">Junior</button>
                <button type="button" class="filter-radio" data-filter-level-radio="Mid" aria-checked="false">Mid</button>
                <button type="button" class="filter-radio" data-filter-level-radio="Senior" aria-checked="false">Senior</button>
              </div>
            </div>

            <div>
              <div class="flex justify-between items-center mb-3">
                <span class="form-label mb-0">Salary</span>
                <span id="salary-label" class="text-xs text-[var(--rd-primary)] font-semibold">$40k+</span>
              </div>
              <input
                id="filter-salary"
                type="range"
                min="40000"
                max="250000"
                step="10000"
                value="40000"
                class="salary-range"
              />
              <div class="flex justify-between text-xs text-muted mt-2">
                <span>$40k</span><span>$250k</span>
              </div>
            </div>

            <div>
              <p class="form-label">Tech stack</p>
              <div id="tag-filters" class="flex flex-wrap gap-2"></div>
            </div>

            <div>
              <p class="form-label">Source</p>
              <div class="flex flex-wrap gap-2">
                <button type="button" class="tag-chip cursor-pointer" data-source-filter="all" aria-pressed="true">All</button>
                <button type="button" class="tag-chip cursor-pointer" data-source-filter="curated" aria-pressed="false">Curated</button>
                <button type="button" class="tag-chip cursor-pointer" data-source-filter="partner" aria-pressed="false">Partners</button>
              </div>
            </div>

            <button type="button" id="clear-filters" class="btn-secondary w-full !py-2 text-sm">
              Clear filters
            </button>
          </div>
        </aside>

        <div>
          <p class="hidden lg:block text-sm text-muted mb-5" data-results-count></p>

          <section id="featured-jobs" class="mb-12 hidden">
            <h2 class="font-display text-xl font-semibold mb-5">Featured</h2>
            <div data-featured-list class="grid gap-5"></div>
          </section>

          <section>
            <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
              <h2 class="font-display text-xl font-semibold">All openings</h2>
              <p id="jobs-loading" class="text-sm text-[var(--rd-primary)] hidden">
                Fetching live jobs…
              </p>
            </div>
            <div id="job-results" class="grid gap-5 results-fade"></div>
            <div id="empty-state" class="hidden surface-panel p-10 text-center">
              <p class="font-display font-semibold text-lg">No jobs match</p>
              <p class="text-muted text-sm mt-2">
                Try clearing filters or broadening your search.
              </p>
            </div>
            <div id="pagination"></div>
          </section>

          <section class="mt-16 pt-12 border-t border-[var(--rd-border)]">
            <h2 class="font-display text-2xl font-bold mb-2">
              Jobs from around the web
            </h2>
            <p id="api-attribution" class="text-muted text-sm mb-6">
              Loading partner feeds…
            </p>
            <div id="partner-jobs" class="grid gap-5"></div>
          </section>
        </div>
      </div>
    </main>

    <div data-rd-footer></div>
    <script>
      window.RDChrome && window.RDChrome.mount();
    </script>
    <script src="/js/theme.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/jobs-data.js"></script>
    <script src="/js/jobs-utils.js"></script>
    <script src="/js/jobs-api.js"></script>
    <script src="/js/jobs-board.js"></script>
    <script src="https://gumroad.com/js/gumroad.js"></script>
    <script src="/js/analytics-config.js"></script>
    <script src="/js/analytics.js"></script>
  </body>
</html>
