        theme: {
          extend: {
            colors: {
              navy: { DEFAULT: "#0B1220", mid: "#111827", light: "#1F2937" },
              accent: { teal: "#3B82F6", cyan: "#6366F1" },

  <body class="antialiased">
    <div data-rd-header="companies"></div>
    <script src="/js/chrome.js"></script>

    <main id="main" class="mx-auto max-w-6xl px-4 sm:px-6 py-12 sm:py-16">
      <div class="max-w-2xl mb-12">
        <h1 class="font-display text-3xl sm:text-4xl font-bold">Companies</h1>
        <p class="text-muted mt-3 text-lg">
          Teams that hire remote — and mean it.
        </p>
      </div>
      <div class="mb-10 grid sm:grid-cols-2 lg:grid-cols-3 gap-4" data-reveal>
        <a href="/companies/openai.html" class="browse-card"><span class="font-semibold">OpenAI remote jobs</span></a>
        <a href="/companies/stripe.html" class="browse-card"><span class="font-semibold">Stripe remote jobs</span></a>
        <a href="/companies/shopify.html" class="browse-card"><span class="font-semibold">Shopify remote jobs</span></a>
        <a href="/companies/github.html" class="browse-card"><span class="font-semibold">GitHub remote jobs</span></a>
        <a href="/companies/vercel.html" class="browse-card"><span class="font-semibold">Vercel remote jobs</span></a>
        <a href="/companies/cloudflare.html" class="browse-card"><span class="font-semibold">Cloudflare remote jobs</span></a>
        <a href="/companies/gitlab.html" class="browse-card"><span class="font-semibold">GitLab remote jobs</span></a>
        <a href="/roles/startup.html" class="browse-card"><span class="font-semibold text-[var(--rd-primary)]">Startup jobs →</span></a>
      </div>
      <div
        id="companies-wall"
        class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"
      ></div>
    </main>

    <div data-rd-footer></div>
    <script>window.RDChrome && window.RDChrome.mount();</script>

    <script src="/js/theme.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/jobs-data.js"></script>
    <script src="/js/jobs-utils.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const el = document.getElementById("companies-wall");
        if (!el || !window.RD_COMPANIES) return;
        el.innerHTML = window.RD_COMPANIES.map((c) => {
          const href = c.jobsPage || c.url;
          const external = !c.jobsPage;
          const target = external
            ? ' target="_blank" rel="noopener noreferrer"'
            : "";
          return `
          <a href="${window.RDJobs.escapeAttr(href)}"${target} class="company-tile">
            ${window.RDJobs.logoMarkHTML(c, { size: 56, className: "w-14 h-14 text-lg" })}
            <span class="text-sm font-medium text-center">${window.RDJobs.escapeHtml(c.name)}</span>
          </a>`;
        }).join("");
      });
    </script>
    <script src="https://gumroad.com/js/gumroad.js"></script>
    <script src="/js/analytics-config.js"></script>
    <script src="/js/analytics.js"></script>
  </body>
